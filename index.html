<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Deutsch A2 · Prácticas Interactivas</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --negro:   #0A0C0F;
  --carbon:  #12161C;
  --panel:   #191E27;
  --borde:   #2A3140;
  --naranja: #EA580C;
  --nar-lt:  #431407;
  --nar-glow:#FB923C;
  --ambar:   #D97706;
  --ambar-lt:#451A03;
  --verde:   #16A34A;
  --verde-lt:#14532D;
  --rojo:    #DC2626;
  --rojo-lt: #450A0A;
  --cyan:    #0891B2;
  --texto:   #E2E8F0;
  --muted:   #7C8BA1;
  --blanco:  #F8FAFC;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit',sans-serif;background:var(--negro);color:var(--texto);min-height:100vh}

/* ── LAYOUT ── */
.layout{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{
width:264px;flex-shrink:0;
background:var(–carbon);
border-right:1px solid var(–borde);
display:flex;flex-direction:column;
position:fixed;top:0;left:0;
height:100vh;overflow-y:auto;
z-index:50;transition:transform 0.3s;
}
.sidebar-head{
padding:20px 16px 14px;
border-bottom:1px solid var(–borde);
position:sticky;top:0;
background:var(–carbon);z-index:2;
}
.sidebar-logo{
font-size:19px;font-weight:800;color:var(–blanco);
display:flex;align-items:center;gap:8px;margin-bottom:5px;
}
.sidebar-logo span{
background:var(–naranja);color:#fff;
font-size:11px;font-weight:700;
padding:2px 8px;border-radius:4px;
letter-spacing:0.06em;
}
.score-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(–muted)}
.score-pill{
background:var(–nar-lt);color:var(–nar-glow);
font-weight:700;font-size:13px;
padding:2px 10px;border-radius:20px;
font-family:‘JetBrains Mono’,monospace;
}
.sidebar-nav{padding:8px 0 24px}
.nav-tema{
display:flex;align-items:center;gap:8px;
padding:8px 14px;font-size:12.5px;font-weight:500;
color:var(–muted);cursor:pointer;
border-left:3px solid transparent;
transition:all 0.15s;line-height:1.3;
}
.nav-tema:hover{color:var(–blanco);background:rgba(255,255,255,0.04)}
.nav-tema.activo{color:var(–nar-glow);border-left-color:var(–nar-glow);background:rgba(234,88,12,0.1)}
.nav-tema.done{color:var(–verde)}
.nav-num{font-family:‘JetBrains Mono’,monospace;font-size:10px;color:var(–borde);min-width:18px;flex-shrink:0}
.nav-check{font-size:10px;margin-left:auto;flex-shrink:0;color:var(–muted)}

/* ── HAMBURGER ── */
.hamburger{
display:none;position:fixed;top:14px;left:14px;z-index:200;
background:var(–naranja);border:none;border-radius:8px;
width:38px;height:38px;cursor:pointer;
flex-direction:column;align-items:center;justify-content:center;gap:5px;
}
.hamburger span{display:block;width:18px;height:2px;background:#fff;border-radius:2px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:40}

/* ── MAIN ── */
.main{margin-left:264px;flex:1;padding:32px 24px 80px;max-width:820px}

/* ── HERO INICIO ── */
.inicio{
display:flex;flex-direction:column;
align-items:center;justify-content:center;
min-height:60vh;text-align:center;padding:40px 16px;
}
.inicio-flag{font-size:72px;margin-bottom:18px;filter:drop-shadow(0 4px 24px rgba(234,88,12,.3))}
.inicio h1{font-size:clamp(28px,5vw,38px);font-weight:800;color:var(–blanco);margin-bottom:10px}
.inicio h1 em{font-style:normal;color:var(–nar-glow)}
.inicio p{font-size:15px;color:var(–muted);max-width:420px;line-height:1.7;margin-bottom:28px}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:360px;margin-bottom:28px}
.stat-card{background:var(–panel);border:1px solid var(–borde);border-radius:10px;padding:14px;text-align:center}
.stat-card .num{font-family:‘JetBrains Mono’,monospace;font-size:26px;font-weight:700;color:var(–nar-glow)}
.stat-card .lbl{font-size:11px;color:var(–muted);margin-top:2px}
.btn-start{
font-family:‘Outfit’,sans-serif;font-size:16px;font-weight:700;
padding:14px 40px;background:var(–naranja);color:#fff;
border:none;border-radius:10px;cursor:pointer;transition:all 0.2s;
}
.btn-start:hover{background:var(–nar-glow);transform:translateY(-2px);box-shadow:0 8px 28px rgba(234,88,12,.35)}

/* ── TEMA HEADER ── */
.tema-header{
display:flex;align-items:flex-start;gap:14px;
margin-bottom:24px;padding-bottom:20px;
border-bottom:1px solid var(–borde);
}
.tema-icon{
width:48px;height:48px;border-radius:12px;
background:linear-gradient(135deg,var(–naranja),var(–ambar));
display:flex;align-items:center;justify-content:center;
font-size:22px;flex-shrink:0;
}
.tema-title{font-size:22px;font-weight:800;color:var(–blanco);line-height:1.2}
.tema-sub{font-size:13px;color:var(–muted);margin-top:3px}
.tema-pts{margin-left:auto;text-align:right;flex-shrink:0}
.tema-pts .big{font-family:‘JetBrains Mono’,monospace;font-size:24px;font-weight:700;color:var(–nar-glow)}
.tema-pts .lbl{font-size:11px;color:var(–muted)}

/* ── PROGRESS BAR ── */
.prog-wrap{background:var(–borde);border-radius:20px;height:4px;margin-bottom:24px;overflow:hidden}
.prog-bar{height:100%;background:linear-gradient(90deg,var(–naranja),var(–ambar));border-radius:20px;transition:width .4s ease}

/* ── TIPO SECCIÓN ── */
.tipo-sec{margin-bottom:32px}
.tipo-label{
display:flex;align-items:center;gap:8px;
font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
color:var(–muted);margin-bottom:14px;
}
.tipo-label::after{content:’’;flex:1;height:1px;background:var(–borde)}
.tbadge{padding:3px 10px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.08em}
.tbadge-mc  {background:#1C2A1C;color:#4ADE80}
.tbadge-fill{background:#1C1A2A;color:#818CF8}
.tbadge-tr  {background:#2A1C0A;color:#FCD34D}

/* ── TARJETA EJERCICIO ── */
.ejercicio{
background:var(–panel);border:1px solid var(–borde);
border-radius:12px;padding:18px 20px;margin-bottom:12px;
transition:border-color .2s;
}
.ejercicio.correcto{border-color:var(–verde)}
.ejercicio.incorrecto{border-color:var(–rojo)}
.ej-num{font-family:‘JetBrains Mono’,monospace;font-size:10px;color:var(–muted);margin-bottom:8px}
.ej-p{font-size:15px;font-weight:600;color:var(–blanco);line-height:1.5;margin-bottom:14px}
.ej-p em{font-style:normal;color:var(–nar-glow)}

/* Opciones MC */
.opciones{display:flex;flex-direction:column;gap:7px}
.opcion{
display:flex;align-items:center;gap:10px;
padding:10px 14px;border-radius:8px;
border:1.5px solid var(–borde);background:var(–carbon);
cursor:pointer;font-size:14px;font-weight:500;color:var(–texto);
transition:all .15s;text-align:left;font-family:‘Outfit’,sans-serif;
}
.opcion:hover:not(:disabled){border-color:var(–nar-glow);color:var(–blanco);background:rgba(234,88,12,.1)}
.opcion.ok {border-color:var(–verde)!important;background:rgba(22,163,74,.12)!important;color:#86EFAC!important}
.opcion.err{border-color:var(–rojo)!important;background:rgba(220,38,38,.1)!important;color:#FCA5A5!important}
.opcion.rev{border-color:var(–verde)!important;background:rgba(22,163,74,.07)!important;color:#86EFAC!important}
.opcion:disabled{cursor:default}
.op-letra{
width:24px;height:24px;border-radius:6px;background:var(–borde);
display:flex;align-items:center;justify-content:center;
font-size:11px;font-weight:700;font-family:‘JetBrains Mono’,monospace;flex-shrink:0;
}

/* Fill */
.fill-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.fill-inp{
font-family:‘JetBrains Mono’,monospace;font-size:15px;font-weight:500;
padding:9px 14px;background:var(–carbon);
border:1.5px solid var(–borde);border-radius:8px;
color:var(–blanco);outline:none;min-width:160px;transition:border-color .2s;
}
.fill-inp:focus{border-color:var(–nar-glow)}
.fill-inp.ok {border-color:var(–verde)!important;color:#86EFAC}
.fill-inp.err{border-color:var(–rojo)!important;color:#FCA5A5}
.fill-inp:disabled{cursor:default}

/* Traducir */
.tr-inp{
width:100%;font-family:‘Outfit’,sans-serif;font-size:14px;
padding:11px 14px;background:var(–carbon);
border:1.5px solid var(–borde);border-radius:8px;
color:var(–blanco);outline:none;margin-bottom:10px;transition:border-color .2s;
}
.tr-inp:focus{border-color:var(–nar-glow)}
.tr-inp.ok {border-color:var(–verde);color:#86EFAC}
.tr-inp.err{border-color:var(–rojo);color:#FCA5A5}
.tr-inp:disabled{cursor:default}

/* Botón verificar */
.btn-chk{
font-family:‘Outfit’,sans-serif;font-size:13px;font-weight:700;
padding:9px 18px;border-radius:8px;border:none;
background:var(–naranja);color:#fff;cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn-chk:hover:not(:disabled){background:var(–nar-glow);transform:translateY(-1px)}
.btn-chk:disabled{background:var(–borde);color:var(–muted);cursor:default;transform:none}

/* Feedback */
.feedback{display:none;margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.6}
.feedback.ok {display:block;background:rgba(22,163,74,.1);border:1px solid rgba(22,163,74,.3);color:#86EFAC}
.feedback.err{display:block;background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.25);color:#FCA5A5}

/* Resumen */
.resumen{
background:var(–panel);border:1px solid var(–borde);
border-radius:14px;padding:28px;text-align:center;
margin-top:16px;display:none;
}
.resumen.vis{display:block}
.resumen h3{font-size:20px;font-weight:800;color:var(–blanco);margin-bottom:6px}
.big-score{font-family:‘JetBrains Mono’,monospace;font-size:52px;font-weight:700;color:var(–nar-glow);margin:12px 0}
.resumen p{font-size:14px;color:var(–muted);margin-bottom:20px}
.btn-sig{
font-family:‘Outfit’,sans-serif;font-size:14px;font-weight:700;
padding:12px 28px;background:var(–naranja);color:#fff;
border:none;border-radius:8px;cursor:pointer;transition:all .2s;
}
.btn-sig:hover{background:var(–nar-glow);transform:translateY(-1px)}

@media(max-width:768px){
.sidebar{transform:translateX(-100%)}
.sidebar.open{transform:translateX(0)}
.overlay.open{display:block}
.main{margin-left:0;padding:20px 16px 64px}
.hamburger{display:flex}
.main{padding-top:64px}
}
</style>

</head>
<body>

<button class="hamburger" id="ham" onclick="toggleSidebar()">
  <span></span><span></span><span></span>
</button>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="layout">
<nav class="sidebar" id="sidebar">
  <div class="sidebar-head">
    <div class="sidebar-logo">🇩🇪 Deutsch <span>A2</span></div>
    <div class="score-row">Puntuación: <span class="score-pill" id="score-total">0</span></div>
  </div>
  <div class="sidebar-nav" id="sidebar-nav"></div>
</nav>

<main class="main" id="main-content">
  <div class="inicio" id="pantalla-inicio">
    <div class="inicio-flag">🇩🇪</div>
    <h1>Alemán <em>A2</em><br>Prácticas Interactivas</h1>
    <p>25 temas del nivel A2 — tiempos pasados, verbos separables, Konjunktiv II, voz pasiva y mucho más.</p>
    <div class="stats-grid">
      <div class="stat-card"><div class="num">25</div><div class="lbl">Temas</div></div>
      <div class="stat-card"><div class="num">3</div><div class="lbl">Tipos</div></div>
      <div class="stat-card"><div class="num">750</div><div class="lbl">Ejercicios</div></div>
    </div>
    <button class="btn-start" onclick="iniciarCurso()">Comenzar →</button>
  </div>
  <div id="pantalla-tema" style="display:none"></div>
</main>
</div>

<script>
const TEMAS = [
/* ══ 0 ══════════════════════════════════════════ */
{id:0,titulo:"Los Tiempos Pasados",icono:"⏳",
mc:[
  {p:"¿Cuál es el tiempo pasado más usado en alemán hablado?",ops:["Präteritum","Plusquamperfekt","Perfekt","Futur II"],r:2,exp:"El Perfekt es el tiempo pasado estándar en la lengua hablada."},
  {p:"¿Cuál auxiliar usa 'kommen' en Perfekt?",ops:["haben","sein","werden","lassen"],r:1,exp:"Verbos de movimiento usan 'sein': ich bin gekommen."},
  {p:"¿Cuál auxiliar usa 'essen' en Perfekt?",ops:["sein","werden","haben","lassen"],r:2,exp:"Verbos transitivos usan 'haben': ich habe gegessen."},
  {p:"¿Cómo se forma el Partizip II de 'machen'?",ops:["gemacht","macht","gemachtet","machte"],r:0,exp:"Verbos regulares: ge- + raíz + -t → gemacht."},
  {p:"¿Cómo se forma el Partizip II de 'schreiben'?",ops:["geschreibt","schrieben","geschrieben","schreibte"],r:2,exp:"schreiben es irregular: geschrieben (ge- + raíz cambiada + -en)."},
  {p:"'Ich ___ gestern ins Kino gegangen'",ops:["habe","bin","war","hatte"],r:1,exp:"gehen = movimiento → sein: ich bin gegangen."},
  {p:"'Sie ___ das Buch gelesen'",ops:["ist","sind","hat","haben"],r:2,exp:"lesen = transitivo → haben: sie hat gelesen."},
  {p:"¿Cómo se forma el Partizip II de 'arbeiten'?",ops:["gearbeitet","gearbeit","gearbeitete","arbeitete"],r:0,exp:"Verbos en -ten: ge- + raíz + -et → gearbeitet."},
  {p:"¿Cuál auxiliar usa 'bleiben' en Perfekt?",ops:["haben","werden","sein","lassen"],r:2,exp:"bleiben (quedarse) usa sein: ich bin geblieben."},
  {p:"¿Cuál auxiliar usa 'schlafen' en Perfekt?",ops:["sein","werden","lassen","haben"],r:3,exp:"schlafen no implica movimiento ni cambio de estado → haben."},
],
fill:[
  {p:"Ich ___ gestern Fußball gespielt. (jugué fútbol ayer)",ans:["habe"],exp:"spielen → haben: ich habe gespielt"},
  {p:"Er ___ nach Berlin gefahren. (viajó a Berlín)",ans:["ist"],exp:"fahren = movimiento → sein"},
  {p:"Wir ___ das Essen gekocht. (cocinamos la comida)",ans:["haben"],exp:"kochen → haben"},
  {p:"Sie ___ früh aufgestanden. (se levantó temprano)",ans:["ist"],exp:"aufstehen = cambio de estado → sein"},
  {p:"Ich ___ einen Brief geschrieben. (escribí una carta)",ans:["habe"],exp:"schreiben → haben"},
  {p:"Du ___ lange geschlafen. (dormiste mucho)",ans:["hast"],exp:"schlafen → haben: du hast geschlafen"},
  {p:"Er ___ ins Wasser gesprungen. (saltó al agua)",ans:["ist"],exp:"springen = movimiento → sein"},
  {p:"Wir ___ viel gelernt. (aprendimos mucho)",ans:["haben"],exp:"lernen → haben"},
  {p:"Sie ___ nach Hause gegangen. (fue a casa)",ans:["ist"],exp:"gehen = movimiento → sein"},
  {p:"Ich habe das Buch ___. (leí el libro)",ans:["gelesen"],exp:"lesen → Partizip II: gelesen"},
],
tr:[
  {p:"Traduce: 'Ayer fui al cine'",ans:["Ich bin gestern ins Kino gegangen"],exp:"sein + gegangen (Perfekt de gehen)"},
  {p:"Traduce: 'Ella comió una manzana'",ans:["Sie hat einen Apfel gegessen"],exp:"haben + gegessen (Perfekt de essen)"},
  {p:"Traduce: 'Dormimos mucho'",ans:["Wir haben viel geschlafen"],exp:"haben + geschlafen"},
  {p:"Traduce: 'Él viajó a Berlín'",ans:["Er ist nach Berlin gefahren"],exp:"sein + gefahren (fahren = movimiento)"},
  {p:"Traduce: 'Escribí una carta'",ans:["Ich habe einen Brief geschrieben"],exp:"haben + geschrieben"},
  {p:"Traduce: 'Ella se levantó temprano'",ans:["Sie ist früh aufgestanden"],exp:"sein + aufgestanden"},
  {p:"Traduce: 'Aprendimos mucho'",ans:["Wir haben viel gelernt"],exp:"haben + gelernt"},
  {p:"Traduce: '¿Qué hiciste ayer?'",ans:["Was hast du gestern gemacht?"],exp:"haben + gemacht"},
  {p:"Traduce: 'Él saltó al agua'",ans:["Er ist ins Wasser gesprungen"],exp:"sein + gesprungen"},
  {p:"Traduce: 'Leí el libro'",ans:["Ich habe das Buch gelesen"],exp:"haben + gelesen"},
]},

/* ══ 1 ══════════════════════════════════════════ */
{id:1,titulo:"Guía A2 — Estructuras Clave",icono:"📘",
mc:[
  {p:"¿Qué introduce la conjunción 'weil'?",ops:["una consecuencia","una condición","una causa/razón","una concesión"],r:2,exp:"'weil' = porque (causa). El verbo va al final: Ich lerne, weil es wichtig ist."},
  {p:"¿Qué introduce 'dass'?",ops:["una causa","una oración subordinada con 'que'","una condición","una comparación"],r:1,exp:"'dass' = que. Ich denke, dass er kommt."},
  {p:"¿Dónde va el verbo en una oración con 'weil'?",ops:["posición 1","posición 2","al final","antes del sujeto"],r:2,exp:"En subordinadas con weil/dass/wenn → verbo al final."},
  {p:"¿Qué introduce 'wenn'?",ops:["causa","comparación","condición o cuando","oposición"],r:2,exp:"'wenn' = cuando/si (condición o situación repetida)."},
  {p:"'Ich bleibe zu Hause, ___ es regnet'",ops:["dass","weil","aber","denn"],r:1,exp:"weil = porque. Ich bleibe zu Hause, weil es regnet."},
  {p:"¿Qué diferencia hay entre 'weil' y 'denn'?",ops:["Son idénticos","weil = subordinada (verbo al final), denn = coordinada (verbo pos.2)","denn = subordinada","No hay diferencia práctica"],r:1,exp:"weil → verbo al final. denn → posición 2 normal."},
  {p:"'Ich glaube, ___ er krank ist'",ops:["weil","wenn","dass","ob"],r:2,exp:"dass introduce una oración completiva: Ich glaube, dass er krank ist."},
  {p:"¿Qué introduce 'obwohl'?",ops:["causa","condición","concesión (aunque)","comparación"],r:2,exp:"'obwohl' = aunque. Obwohl es regnet, gehe ich spazieren."},
  {p:"'___ du Zeit hast, komm bitte' (si tienes tiempo)",ops:["Weil","Dass","Wenn","Obwohl"],r:2,exp:"'wenn' = si/cuando en condicionales."},
  {p:"¿Cuál conjunción NO cambia el orden del verbo?",ops:["weil","dass","obwohl","denn"],r:3,exp:"'denn' es coordinante → no cambia el orden: Er kommt nicht, denn er ist krank."},
],
fill:[
  {p:"Ich lerne Deutsch, ___ ich in Berlin wohne. (porque)",ans:["weil"],exp:"weil + verbo al final"},
  {p:"Ich denke, ___ er heute kommt. (que)",ans:["dass"],exp:"dass introduce subordinada"},
  {p:"___ es regnet, bleibe ich zu Hause. (cuando/si)",ans:["Wenn"],exp:"Wenn = cuando/si"},
  {p:"Er ist müde, ___ er viel gearbeitet hat. (porque)",ans:["weil"],exp:"weil + Perfekt al final"},
  {p:"Ich weiß, ___ du Recht hast. (que)",ans:["dass"],exp:"dass + verbo al final"},
  {p:"___ es kalt ist, trage ich eine Jacke. (aunque)",ans:["Obwohl"],exp:"Obwohl = aunque"},
  {p:"Ich kann nicht kommen, ___ ich arbeite. (porque — coordinante)",ans:["denn"],exp:"denn = posición 2 normal"},
  {p:"Sie fragt, ___ ich morgen komme. (si/whether)",ans:["ob"],exp:"ob = si (pregunta indirecta)"},
  {p:"___ ich Zeit habe, lese ich gern. (cuando)",ans:["Wenn"],exp:"Wenn = cuando (situación habitual)"},
  {p:"Ich glaube nicht, ___ er kommt. (que)",ans:["dass"],exp:"dass + verbo al final"},
],
tr:[
  {p:"Traduce: 'Me quedo en casa porque llueve'",ans:["Ich bleibe zu Hause, weil es regnet"],exp:"weil + verbo al final"},
  {p:"Traduce: 'Creo que él viene hoy'",ans:["Ich glaube, dass er heute kommt"],exp:"dass + verbo al final"},
  {p:"Traduce: 'Si tienes tiempo, ven'",ans:["Wenn du Zeit hast, komm"],exp:"wenn + verbo al final"},
  {p:"Traduce: 'Él está cansado porque trabajó mucho'",ans:["Er ist müde, weil er viel gearbeitet hat"],exp:"weil + Perfekt"},
  {p:"Traduce: 'Aunque llueve, salgo a caminar'",ans:["Obwohl es regnet, gehe ich spazieren"],exp:"obwohl + verbo al final"},
  {p:"Traduce: 'No puedo venir porque trabajo'",ans:["Ich kann nicht kommen, denn ich arbeite"],exp:"denn = coordinante"},
  {p:"Traduce: 'Ella pregunta si vengo mañana'",ans:["Sie fragt, ob ich morgen komme"],exp:"ob = si (indirecta)"},
  {p:"Traduce: 'Sé que tienes razón'",ans:["Ich weiß, dass du Recht hast"],exp:"dass + verbo al final"},
  {p:"Traduce: 'Cuando tengo tiempo, leo'",ans:["Wenn ich Zeit habe, lese ich"],exp:"wenn al inicio → inversión"},
  {p:"Traduce: 'No creo que él venga'",ans:["Ich glaube nicht, dass er kommt"],exp:"dass + verbo al final"},
]},

/* ══ 2 ══════════════════════════════════════════ */
{id:2,titulo:"Verbos Modales en Pasado",icono:"⚙️",
mc:[
  {p:"¿Cómo se dice 'podía / pude' (Präteritum de können)?",ops:["konnte","könnte","kann","konnten"],r:0,exp:"können → ich konnte (Präteritum, sin umlaut)."},
  {p:"¿Cómo se dice 'tenía que' (Präteritum de müssen)?",ops:["musste","müsste","muss","müssen"],r:0,exp:"müssen → ich musste."},
  {p:"¿Cómo se dice 'quería' (Präteritum de wollen)?",ops:["wollte","wollten","will","wolle"],r:0,exp:"wollen → ich wollte."},
  {p:"¿Cómo se dice 'debía' (Präteritum de sollen)?",ops:["soll","sollte","solle","sollt"],r:1,exp:"sollen → ich sollte."},
  {p:"¿Cómo se dice 'se le permitía' (Präteritum de dürfen)?",ops:["durfte","dürfte","darf","durften"],r:0,exp:"dürfen → ich durfte (sin umlaut)."},
  {p:"'Als Kind ___ ich viel spielen' (podía jugar)",ops:["konnte","kann","könnte","kannte"],r:0,exp:"können Präteritum → konnte."},
  {p:"'Ich ___ gestern früh aufstehen' (tenía que)",ops:["muss","musste","müsste","müssen"],r:1,exp:"müssen Präteritum → musste."},
  {p:"Los verbos modales en Präteritum terminan en:",ops:["-te / -test / -te…","-te / -tet / -ten…","-te / -test / -ten…","-st / -t / -en"],r:2,exp:"ich musste / du musstest / er musste / wir mussten / ihr musstet / sie mussten."},
  {p:"'Er ___ nicht kommen' (no podía venir — pasado)",ops:["kann nicht","konnte nicht","könnte nicht","darf nicht"],r:1,exp:"konnte nicht = no podía."},
  {p:"'Ich ___ das nicht machen' (no debía hacerlo — pasado)",ops:["darf nicht","durfte nicht","sollte nicht","musste nicht"],r:1,exp:"durfte nicht = no se le permitía / no debía (prohibición pasada)."},
],
fill:[
  {p:"Als Kind ___ ich gut schwimmen. (podía nadar)",ans:["konnte"],exp:"können Präteritum → konnte"},
  {p:"Ich ___ gestern arbeiten. (tenía que trabajar)",ans:["musste"],exp:"müssen Präteritum → musste"},
  {p:"Er ___ nicht kommen. (no podía venir)",ans:["konnte"],exp:"konnte nicht = no podía"},
  {p:"Wir ___ früh aufstehen. (teníamos que levantarnos)",ans:["mussten"],exp:"müssen → wir mussten"},
  {p:"Sie ___ das nicht machen. (no debía hacerlo)",ans:["durfte","sollte"],exp:"durfte nicht / sollte nicht"},
  {p:"Du ___ gut Gitarre spielen. (podías tocar guitarra)",ans:["konntest"],exp:"können → du konntest"},
  {p:"Ich ___ um 8 Uhr da sein. (debía estar a las 8)",ans:["sollte"],exp:"sollen Präteritum → sollte"},
  {p:"Sie ___ nicht rauchen. (no podía fumar — prohibición)",ans:["durfte"],exp:"dürfen Präteritum → durfte"},
  {p:"Wir ___ nach Hause gehen. (quisimos ir a casa)",ans:["wollten"],exp:"wollen → wir wollten"},
  {p:"Er ___ das Buch kaufen. (quería comprar el libro)",ans:["wollte"],exp:"wollen Präteritum → wollte"},
],
tr:[
  {p:"Traduce: 'De niño podía nadar bien'",ans:["Als Kind konnte ich gut schwimmen"],exp:"konnte = Präteritum de können"},
  {p:"Traduce: 'Ayer tenía que trabajar'",ans:["Ich musste gestern arbeiten"],exp:"musste = Präteritum de müssen"},
  {p:"Traduce: 'Él no podía venir'",ans:["Er konnte nicht kommen"],exp:"konnte nicht"},
  {p:"Traduce: 'Debíamos levantarnos temprano'",ans:["Wir mussten früh aufstehen"],exp:"mussten = wir Präteritum"},
  {p:"Traduce: 'No se le permitía fumar'",ans:["Er durfte nicht rauchen","Sie durfte nicht rauchen"],exp:"durfte nicht"},
  {p:"Traduce: 'Quería comprar el libro'",ans:["Ich wollte das Buch kaufen"],exp:"wollte = Präteritum de wollen"},
  {p:"Traduce: 'Debía estar a las 8'",ans:["Ich sollte um 8 Uhr da sein"],exp:"sollte = Präteritum de sollen"},
  {p:"Traduce: '¿Podías tocar guitarra?'",ans:["Konntest du Gitarre spielen?"],exp:"konntest = du Präteritum"},
  {p:"Traduce: 'Quisieron ir a casa'",ans:["Sie wollten nach Hause gehen"],exp:"wollten = sie Präteritum"},
  {p:"Traduce: 'No debías hacerlo'",ans:["Du solltest das nicht machen","Du durftest das nicht machen"],exp:"solltest / durftest nicht"},
]},

/* ══ 3 ══════════════════════════════════════════ */
{id:3,titulo:"Präteritum — El Pasado Simple",icono:"📜",
mc:[
  {p:"¿Para qué se usa el Präteritum principalmente?",ops:["Lengua hablada cotidiana","Escritura formal, narrativa y verbos sein/haben/modales","Solo para el futuro","Para describir estados futuros"],r:1,exp:"Präteritum = pasado escrito/narrativo y verbos sein, haben, modales."},
  {p:"'Sein' en Präteritum (ich) es:",ops:["hatte","waren","wurde","war"],r:3,exp:"ich war = yo era/estaba (Präteritum de sein)."},
  {p:"'Haben' en Präteritum (er) es:",ops:["hat","hatte","hätte","hatten"],r:1,exp:"er hatte = él tenía/tuvo."},
  {p:"¿Cómo se forma el Präteritum de verbos regulares?",ops:["raíz + -te","raíz + -te + desinencia","ge- + raíz + -t","raíz + -et"],r:1,exp:"ich machte / du machtest / er machte / wir machten…"},
  {p:"Präteritum de 'gehen' (er):",ops:["geht","gehte","ging","gegangen"],r:2,exp:"gehen es irregular: er ging (raíz completamente diferente)."},
  {p:"Präteritum de 'kommen' (wir):",ops:["kamen","kommen","gekommt","kommten"],r:0,exp:"kommen → wir kamen."},
  {p:"Präteritum de 'sprechen' (ich):",ops:["sprechte","sprach","gesprochen","spricht"],r:1,exp:"sprechen → ich sprach (irregular, Ablaut)."},
  {p:"'Ich ___ gestern sehr müde' (era/estaba)",ops:["habe","hatte","war","wurde"],r:2,exp:"sein Präteritum → ich war."},
  {p:"Präteritum de 'sehen' (sie — ella):",ops:["sah","sieht","gesehen","sahen"],r:0,exp:"sehen → sie sah."},
  {p:"'Er ___ ein Buch' (tenía un libro — Präteritum)",ops:["hat","hatte","ist","war"],r:1,exp:"haben Präteritum → er hatte."},
],
fill:[
  {p:"Ich ___ gestern müde. (estaba cansado)",ans:["war"],exp:"sein Präteritum → ich war"},
  {p:"Sie ___ ein Buch. (tenía un libro)",ans:["hatte"],exp:"haben Präteritum → sie hatte"},
  {p:"Er ___ nach Berlin. (fue a Berlín)",ans:["fuhr","ging"],exp:"fahren → fuhr / gehen → ging"},
  {p:"Wir ___ viel. (hablamos mucho)",ans:["sprachen"],exp:"sprechen → wir sprachen"},
  {p:"Ich ___ ihn gestern. (lo vi ayer)",ans:["sah"],exp:"sehen → ich sah"},
  {p:"Es ___ sehr kalt. (hacía mucho frío)",ans:["war"],exp:"sein → es war"},
  {p:"Du ___ recht. (tenías razón)",ans:["hattest"],exp:"haben → du hattest"},
  {p:"Sie ___ zu spät. (llegó tarde)",ans:["kam"],exp:"kommen → sie kam"},
  {p:"Wir ___ den Film. (vimos la película)",ans:["sahen"],exp:"sehen → wir sahen"},
  {p:"Er ___ nichts. (no dijo nada)",ans:["sagte","sprach"],exp:"sagen → sagte / sprechen → sprach"},
],
tr:[
  {p:"Traduce: 'Ayer estaba muy cansado'",ans:["Ich war gestern sehr müde"],exp:"war = Präteritum de sein"},
  {p:"Traduce: 'Ella tenía un libro'",ans:["Sie hatte ein Buch"],exp:"hatte = Präteritum de haben"},
  {p:"Traduce: 'Él fue a Berlín'",ans:["Er fuhr nach Berlin","Er ging nach Berlin"],exp:"fuhr (fahren) o ging (gehen)"},
  {p:"Traduce: 'Hablamos mucho'",ans:["Wir sprachen viel"],exp:"sprachen = wir Präteritum"},
  {p:"Traduce: 'Lo vi ayer'",ans:["Ich sah ihn gestern"],exp:"sah = Präteritum de sehen"},
  {p:"Traduce: 'Hacía mucho frío'",ans:["Es war sehr kalt"],exp:"war = sein Präteritum"},
  {p:"Traduce: 'Tenías razón'",ans:["Du hattest recht"],exp:"hattest = du Präteritum de haben"},
  {p:"Traduce: 'Ella llegó tarde'",ans:["Sie kam zu spät"],exp:"kam = Präteritum de kommen"},
  {p:"Traduce: 'Vimos la película'",ans:["Wir sahen den Film"],exp:"sahen = wir Präteritum de sehen"},
  {p:"Traduce: 'No dijo nada'",ans:["Er sagte nichts","Er sprach nichts"],exp:"sagte / sprach + nichts"},
]},

],
fill:[
  {p:"Ich ___ das Buch schon gelesen. (ya había leído)",ans:["hatte"],exp:"haben → hatte + Partizip II"},
  {p:"Er ___ schon gegangen. (ya se había ido)",ans:["war"],exp:"gehen → sein → war"},
  {p:"Wir ___ das schon gewusst. (ya lo sabíamos)",ans:["hatten"],exp:"wissen → haben → hatten"},
  {p:"Nachdem sie gegessen ___, gingen sie ins Kino. (habían comido)",ans:["hatten"],exp:"essen → haben → hatten"},
  {p:"Sie ___ noch nie geflogen. (nunca había volado)",ans:["war"],exp:"fliegen → sein → war"},
  {p:"Bevor er ankam, ___ ich schon gegessen. (ya había comido)",ans:["hatte"],exp:"essen → haben → hatte"},
  {p:"Er ___ schon eingeschlafen. (ya se había dormido)",ans:["war"],exp:"einschlafen → sein → war"},
  {p:"Ich ___ das nie gemacht. (nunca lo había hecho)",ans:["hatte"],exp:"machen → haben → hatte"},
  {p:"Wir ___ uns noch nie gesehen. (nunca nos habíamos visto)",ans:["hatten"],exp:"sehen → haben → hatten"},
  {p:"Nachdem er gegangen ___, rief sie an. (se había ido)",ans:["war"],exp:"gehen → sein → war"},
],
tr:[
  {p:"Traduce: 'Ya había leído el libro'",ans:["Ich hatte das Buch schon gelesen"],exp:"hatte + Partizip II"},
  {p:"Traduce: 'Ya se había ido'",ans:["Er war schon gegangen"],exp:"war + gegangen"},
  {p:"Traduce: 'Después de que comimos, fuimos al cine'",ans:["Nachdem wir gegessen hatten, gingen wir ins Kino"],exp:"nachdem + Plusquamperfekt"},
  {p:"Traduce: 'Nunca había volado'",ans:["Ich war noch nie geflogen"],exp:"war + geflogen"},
  {p:"Traduce: 'Antes de que llegara, ya había comido'",ans:["Bevor er ankam, hatte ich schon gegessen"],exp:"hatte + gegessen"},
  {p:"Traduce: 'Ya se había dormido'",ans:["Er war schon eingeschlafen"],exp:"war + eingeschlafen"},
  {p:"Traduce: 'Nunca lo habíamos hecho'",ans:["Wir hatten das nie gemacht"],exp:"hatten + gemacht"},
  {p:"Traduce: 'Ya lo sabíamos'",ans:["Wir hatten das schon gewusst"],exp:"hatten + gewusst"},
  {p:"Traduce: 'Después de que ella llamó, él se fue'",ans:["Nachdem sie angerufen hatte, ging er"],exp:"nachdem + Plusquamperfekt"},
  {p:"Traduce: 'Nunca nos habíamos visto'",ans:["Wir hatten uns noch nie gesehen"],exp:"hatten + gesehen"},
]},

{id:7,titulo:"Estilo Indirecto",icono:"💬",
mc:[
  {p:"¿Qué conjunción introduce estilo indirecto en alemán?",ops:["weil","wenn","dass","obwohl"],r:2,exp:"'dass' introduce citas indirectas: Er sagt, dass er krank ist."},
  {p:"'Er sagt, ___ er krank ist'",ops:["ob","weil","dass","wenn"],r:2,exp:"dass + verbo al final."},
  {p:"En estilo indirecto, el verbo va:",ops:["posición 1","posición 2","al final","antes de dass"],r:2,exp:"En subordinada con dass → verbo al final."},
  {p:"¿Qué modo verbal se usa formalmente en estilo indirecto?",ops:["Konjunktiv I","Konjunktiv II","Imperativo","Futur II"],r:0,exp:"Konjunktiv I es el modo formal del estilo indirecto."},
  {p:"'Sie fragt, ___ er kommt' (si viene)",ops:["dass","weil","ob","wenn"],r:2,exp:"'ob' introduce preguntas indirectas (si/whether)."},
  {p:"'Er behauptet, ___ er das nicht getan hat'",ops:["ob","weil","wenn","dass"],r:3,exp:"dass + verbo al final (hat → al final)."},
  {p:"Konjunktiv I de 'sein' (er) es:",ops:["ist","wäre","sei","war"],r:2,exp:"Er sei krank = (dice que) él está enfermo."},

  {p:"Wenn ich reich ___, würde ich reisen. (si fuera rico)",ans:["wäre"],exp:"wäre = Konjunktiv II de sein"},
  {p:"Wenn ich mehr Geld ___, würde ich ein Haus kaufen. (si tuviera más dinero)",ans:["hätte"],exp:"hätte = Konjunktiv II de haben"},
  {p:"___ du mir bitte helfen? (¿podrías ayudarme? — cortés)",ans:["Würdest"],exp:"Würdest du... = condicional cortés"},
  {p:"Ich ___ so gern Urlaub machen! (ojalá pudiera ir de vacaciones)",ans:["würde"],exp:"würde + Infinitiv = deseo"},
  {p:"Er ___ früher aufstehen, wenn er pünktlich sein will. (debería levantarse)",ans:["würde","sollte"],exp:"würde / sollte"},
  {p:"Wenn das Wetter besser ___, würden wir ausgehen. (si hiciera mejor tiempo)",ans:["wäre"],exp:"wäre = Konjunktiv II de sein"},
  {p:"Ich ___ gern mehr schlafen. (me gustaría dormir más)",ans:["würde"],exp:"würde + Infinitiv"},
],
tr:[
  {p:"Traduce: 'Me gustaría viajar'",ans:["Ich würde gern reisen"],exp:"würde + Infinitiv"},
  {p:"Traduce: 'Si tuviera tiempo, leería'",ans:["Wenn ich Zeit hätte, würde ich lesen"],exp:"hätte + würde + Infinitiv"},
  {p:"Traduce: '¿Podrías ayudarme?'",ans:["Würdest du mir helfen?"],exp:"Würdest + Infinitiv"},
  {p:"Traduce: 'Si fuera rico, viajaría'",ans:["Wenn ich reich wäre, würde ich reisen"],exp:"wäre + würde"},
  {p:"Traduce: 'Me gustaría ir al cine'",ans:["Ich würde gern ins Kino gehen"],exp:"würde gern + Infinitiv"},
  {p:"Traduce: 'Si hiciera mejor tiempo, saldríamos'",ans:["Wenn das Wetter besser wäre, würden wir ausgehen"],exp:"wäre + würden"},
  {p:"Traduce: 'Me gustaría dormir más'",ans:["Ich würde gern mehr schlafen"],exp:"würde gern + Infinitiv"},
  {p:"Traduce: 'Yo no haría eso'",ans:["Ich würde das nicht tun"],exp:"würde + nicht + Infinitiv"},
  {p:"Traduce: 'Si tuviera más dinero, compraría una casa'",ans:["Wenn ich mehr Geld hätte, würde ich ein Haus kaufen"],exp:"hätte + würde"},
  {p:"Traduce: '¿Harías eso?'",ans:["Würdest du das machen?"],exp:"Würdest du + Infinitiv?"},
]},

{id:20,titulo:"Preposiciones con Dativo y Acusativo",icono:"↔️",
mc:[
  {p:"Las Wechselpräpositionen (preposiciones de doble caso) son:",ops:["mit, nach, seit, von","an, auf, in, über, unter, vor, hinter, neben, zwischen","durch, für, gegen, ohne","zu, bei, aus, gegenüber"],r:1,exp:"an, auf, in, über, unter, vor, hinter, neben, zwischen → dativo (lugar) o acusativo (dirección)."},
  {p:"'Ich lege das Buch ___ den Tisch' (pongo el libro en la mesa — dirección)",ops:["auf dem","auf den","an dem","an den"],r:1,exp:"Movimiento → acusativo: auf den Tisch (masc. acus.)."},
  {p:"'Das Buch liegt ___ dem Tisch' (el libro está en la mesa — lugar)",ops:["auf den","auf dem","auf die","auf ein"],r:1,exp:"Lugar estático → dativo: auf dem Tisch."},
  {p:"¿Qué caso indica lugar (wo)?",ops:["Acusativo","Nominativo","Dativo","Genitivo"],r:2,exp:"Wo? (¿dónde?) → dativo. Wohin? (¿adónde?) → acusativo."},
  {p:"'Ich hänge das Bild ___ die Wand' (cuelgo el cuadro en la pared — dirección)",ops:["an der","an die","an den","an dem"],r:1,exp:"Movimiento hacia → acusativo: an die Wand (fem. acus.)."},
  {p:"'Das Bild hängt ___ der Wand' (el cuadro cuelga en la pared — lugar)",ops:["an die","an der","an dem","an den"],r:1,exp:"Lugar → dativo: an der Wand (fem. dativo)."},
  {p:"'Er geht ___ Zimmer' (entra en el cuarto — dirección, neutro)",ops:["ins","im","in dem","in die"],r:0,exp:"in + das (neutro acus.) = ins Zimmer."},
  {p:"'Er ist ___ Zimmer' (está en el cuarto — lugar, neutro)",ops:["ins","im","in das","in die"],r:1,exp:"in + dem (neutro dativo) = im Zimmer."},
  {p:"'Ich stelle die Vase ___ den Tisch' (pongo el jarrón sobre la mesa)",ops:["auf dem","auf den","auf die","auf der"],r:1,exp:"auf + den Tisch (masc. acus.) → dirección."},
  {p:"'Die Katze sitzt ___ dem Bett' (el gato está bajo la cama — dativo)",ops:["unter den","unter dem","unter die","unter der"],r:1,exp:"unter + dem Bett (neutro dativo) → lugar."},
],

  {p:"Ich lege das Buch auf ___ Tisch. (sobre la mesa — dirección masc.)",ans:["den"],exp:"auf + acusativo (dirección) → den"},

  {p:"Ich stelle die Vase auf ___ Tisch. (sobre la mesa — dirección)",ans:["den"],exp:"auf + acusativo masc. → den"},
  {p:"Die Vase steht auf ___ Tisch. (sobre la mesa — lugar)",ans:["dem"],exp:"auf + dativo masc. → dem"},

  {p:"Traduce: 'Él está en el cuarto'",ans:["Er ist im Zimmer","Er ist in dem Zimmer"],exp:"in + dativo neutro"},
  {p:"Traduce: 'Pongo el jarrón sobre la mesa'",ans:["Ich stelle die Vase auf den Tisch"],exp:"auf + acusativo masc."},

/* ══ 21 ══════════════════════════════════════════ */
{id:21,titulo:"Comparativo y Superlativo",icono:"🏆",
mc:[
  {p:"¿Cómo se forma el superlativo predicativo?",ops:["adj + -ste","am + adj + -sten","sehr + adj + -st","am + adj + -er"],r:1,exp:"Superlativo predicativo: am + adj + -sten. Ej: Er ist am schnellsten."},
  {p:"'schnell → schneller → ___' (superlativo)",ops:["am schnellst","am schnellsten","am schnellste","schnellsten"],r:1,exp:"am schnellsten = el más rápido."},
  {p:"Superlativo de 'gut':",ops:["am bester","am güter","am besten","am bessesten"],r:2,exp:"gut → besser → am besten (irregular)."},
  {p:"Superlativo de 'groß':",ops:["am größer","am größten","am größte","am großsten"],r:1,exp:"groß → größer → am größten."},
  {p:"'Er ist ___ Schüler in der Klasse' (el mejor — atributivo)",ops:["am beste","der beste","der bester","den besten"],r:1,exp:"Superlativo atributivo: der/die/das + adj + -ste."},
  {p:"Comparativo de 'viel':",ops:["vieler","mehr","vieliger","vielst"],r:1,exp:"viel → mehr → am meisten (irregular)."},
  {p:"Superlativo de 'alt':",ops:["am älteren","am ältesten","am altest","am alten"],r:1,exp:"alt → älter → am ältesten."},
  {p:"'Das ist ___ schöne Stadt, die ich kenne' (la más bonita — fem.)",ops:["am schönste","die schönste","der schönsten","das schönste"],r:1,exp:"die schönste Stadt (fem. nominativo superlativo atributivo)."},
  {p:"'Er hat ___ Geld' (él tiene el más dinero)",ops:["das meiste","die meiste","das meisten","dem meisten"],r:0,exp:"das meiste Geld (neutro nominativo superlativo atributivo)."},
  {p:"Superlativo de 'wenig':",ops:["am wenigsten","am wenigster","am mindestens","am wenigste"],r:0,exp:"wenig → weniger → am wenigsten."},
],
fill:[
  {p:"Er ist am ___. (es el más rápido — schnell)",ans:["schnellsten"],exp:"am schnellsten = superlativo predicativo"},
  {p:"Sie ist die ___ Schülerin. (la mejor — gut, fem.)",ans:["beste"],exp:"die beste = superlativo atributivo fem."},
  {p:"Das ist am ___. (es el más grande — groß)",ans:["größten"],exp:"am größten = superlativo predicativo"},
  {p:"Er ist der ___ Schüler. (el más viejo — alt, masc.)",ans:["älteste"],exp:"der älteste = superlativo atributivo masc."},
  {p:"Sie hat am ___ Geld. (tiene el menos dinero — wenig)",ans:["wenigsten"],exp:"am wenigsten"},
  {p:"Er hat am ___ Bücher. (tiene los más libros — viel)",ans:["meisten"],exp:"am meisten"},
  {p:"Das ist die ___ Stadt. (la más bonita — schön, fem.)",ans:["schönste"],exp:"die schönste = superlativo atributivo fem."},
  {p:"Er läuft am ___. (corre lo más rápido — schnell)",ans:["schnellsten"],exp:"am schnellsten"},
  {p:"Das Essen ist am ___. (es el más rico — lecker)",ans:["leckersten"],exp:"am leckersten"},
  {p:"Er ist am ___. (es el mejor — gut)",ans:["besten"],exp:"am besten = superlativo irregular"},
],
tr:[
  {p:"Traduce: 'Él es el más rápido'",ans:["Er ist am schnellsten"],exp:"am schnellsten"},
  {p:"Traduce: 'Ella es la mejor alumna'",ans:["Sie ist die beste Schülerin"],exp:"die beste"},
  {p:"Traduce: 'Es lo más grande'",ans:["Es ist am größten"],exp:"am größten"},
  {p:"Traduce: 'Él es el alumno más viejo'",ans:["Er ist der älteste Schüler"],exp:"der älteste"},
  {p:"Traduce: 'Ella tiene el menos dinero'",ans:["Sie hat am wenigsten Geld"],exp:"am wenigsten"},
  {p:"Traduce: 'Él tiene los más libros'",ans:["Er hat am meisten Bücher"],exp:"am meisten"},
  {p:"Traduce: 'Es la ciudad más bonita'",ans:["Das ist die schönste Stadt"],exp:"die schönste"},
  {p:"Traduce: 'Él corre lo más rápido'",ans:["Er läuft am schnellsten"],exp:"am schnellsten"},
  {p:"Traduce: 'Es lo mejor'",ans:["Es ist am besten"],exp:"am besten = irregular"},
  {p:"Traduce: 'Ella es la más joven'",ans:["Sie ist am jüngsten","Sie ist die Jüngste"],exp:"am jüngsten"},
]},

// ══════════════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════════════
let temaActual=0,puntosTotal=0;
const puntosPorTema=new Array(TEMAS.length).fill(0);
const respondidoPorTema=new Array(TEMAS.length).fill(0);

// ══════════════════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════════════════
function renderSidebar(){
  const nav=document.getElementById('sidebar-nav');
  nav.innerHTML=TEMAS.map((t,i)=>`
    <div class="nav-tema ${i===temaActual?'activo':''} ${respondidoPorTema[i]>=30?'done':''}"
         onclick="cargarTema(${i})">
      <span class="nav-num">${String(i+1).padStart(2,'0')}</span>
      ${t.icono} ${t.titulo}
      ${respondidoPorTema[i]>0?`<span class="nav-check">${puntosPorTema[i]}/${respondidoPorTema[i]}</span>`:''}
    </div>`).join('');
  document.getElementById('score-total').textContent=puntosTotal;
}

// ══════════════════════════════════════════════════════
// INICIO
// ══════════════════════════════════════════════════════
function iniciarCurso(){
  document.getElementById('pantalla-inicio').style.display='none';
  document.getElementById('pantalla-tema').style.display='block';
  cargarTema(0);
}

// ══════════════════════════════════════════════════════
// CARGAR TEMA
// ══════════════════════════════════════════════════════
function cargarTema(idx){
  temaActual=idx;
  if(window.innerWidth<=768)cerrarSidebar();
  renderSidebar();
  const t=TEMAS[idx];
  const total=t.mc.length+t.fill.length+t.tr.length;
  const pct=Math.round((respondidoPorTema[idx]/total)*100);
  document.getElementById('pantalla-tema').innerHTML=`
    <div class="tema-header">
      <div class="tema-icon">${t.icono}</div>
      <div>
        <div class="tema-title">${t.titulo}</div>
        <div class="tema-sub">Tema ${idx+1} de ${TEMAS.length} · ${total} ejercicios</div>
      </div>
      <div class="tema-pts">
        <div class="big" id="pts-tema">${puntosPorTema[idx]}</div>
        <div class="lbl">puntos</div>
      </div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" id="pb" style="width:${pct}%"></div></div>
    <div class="tipo-sec">
      <div class="tipo-label"><span class="tbadge tbadge-mc">Selección Múltiple</span></div>
      ${t.mc.map((e,i)=>renderMC(e,idx,i)).join('')}
    </div>
    <div class="tipo-sec">
      <div class="tipo-label"><span class="tbadge tbadge-fill">Completar espacios</span></div>
      ${t.fill.map((e,i)=>renderFill(e,idx,i)).join('')}
    </div>
    <div class="tipo-sec">
      <div class="tipo-label"><span class="tbadge tbadge-tr">Traducir</span></div>
      ${t.tr.map((e,i)=>renderTR(e,idx,i)).join('')}
    </div>
    <div id="res-${idx}" class="resumen"></div>
    ${idx<TEMAS.length-1?`<button class="btn-sig" style="margin-top:16px;display:none" id="btn-sig-${idx}" onclick="cargarTema(${idx+1})">Siguiente tema →</button>`:''}
  `;
  window.scrollTo({top:0,behavior:'smooth'});
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function renderMC(e,tI,eI){
  const L=['A','B','C','D'];
  return`<div class="ejercicio" id="mc-${tI}-${eI}">
    <div class="ej-num">Ej. ${eI+1}</div>
    <div class="ej-p">${e.p}</div>
    <div class="opciones">${e.ops.map((o,oi)=>`
      <button class="opcion" onclick="rMC(${tI},${eI},${oi},${e.r})" id="mo-${tI}-${eI}-${oi}">
        <span class="op-letra">${L[oi]}</span>${o}
      </button>`).join('')}</div>
    <div class="feedback" id="fb-mc-${tI}-${eI}"></div>
  </div>`;
}
function renderFill(e,tI,eI){
  return`<div class="ejercicio" id="fill-${tI}-${eI}">
    <div class="ej-num">Ej. ${eI+1}</div>
    <div class="ej-p">${e.p}</div>
    <div class="fill-row">
      <input class="fill-inp" id="fi-${tI}-${eI}" placeholder="Escribe aquí..."
             onkeydown="if(event.key==='Enter')rFill(${tI},${eI})"/>
      <button class="btn-chk" id="fb-${tI}-${eI}" onclick="rFill(${tI},${eI})">Verificar</button>
    </div>
    <div class="feedback" id="fb-fill-${tI}-${eI}"></div>
  </div>`;
}
function renderTR(e,tI,eI){
  return`<div class="ejercicio" id="tr-${tI}-${eI}">
    <div class="ej-num">Ej. ${eI+1}</div>
    <div class="ej-p">${e.p}</div>
    <input class="tr-inp" id="ti-${tI}-${eI}" placeholder="Tu traducción..."
           onkeydown="if(event.key==='Enter')rTR(${tI},${eI})"/>
    <button class="btn-chk" id="tb-${tI}-${eI}" onclick="rTR(${tI},${eI})">Verificar</button>
    <div class="feedback" id="fb-tr-${tI}-${eI}"></div>
  </div>`;
}

// ══════════════════════════════════════════════════════
// RESPONDER
// ══════════════════════════════════════════════════════
function rMC(tI,eI,sel,cor){
  const card=document.getElementById(`mc-${tI}-${eI}`);
  if(card.classList.contains('correcto')||card.classList.contains('incorrecto'))return;
  const e=TEMAS[tI].mc[eI];
  for(let i=0;i<e.ops.length;i++)document.getElementById(`mo-${tI}-${eI}-${i}`).disabled=true;
  registrar(tI);
  const fb=document.getElementById(`fb-mc-${tI}-${eI}`);
  if(sel===cor){
    document.getElementById(`mo-${tI}-${eI}-${sel}`).classList.add('ok');
    card.classList.add('correcto');
    fb.className='feedback ok';fb.innerHTML=`✅ <strong>¡Correcto!</strong> ${e.exp}`;
    punto(tI);
  }else{
    document.getElementById(`mo-${tI}-${eI}-${sel}`).classList.add('err');
    document.getElementById(`mo-${tI}-${eI}-${cor}`).classList.add('rev');
    card.classList.add('incorrecto');
    fb.className='feedback err';fb.innerHTML=`❌ <strong>Incorrecto.</strong> Correcta: <strong>${e.ops[cor]}</strong>. ${e.exp}`;
  }
}
function rFill(tI,eI){
  const inp=document.getElementById(`fi-${tI}-${eI}`);
  const btn=document.getElementById(`fb-${tI}-${eI}`);
  const card=document.getElementById(`fill-${tI}-${eI}`);
  const fb=document.getElementById(`fb-fill-${tI}-${eI}`);
  if(inp.disabled)return;
  const resp=inp.value.trim();if(!resp)return;
  inp.disabled=true;btn.disabled=true;registrar(tI);
  const e=TEMAS[tI].fill[eI];
  const ok=e.ans.map(a=>a.toLowerCase()).includes(resp.toLowerCase());
  if(ok){inp.classList.add('ok');card.classList.add('correcto');fb.className='feedback ok';fb.innerHTML=`✅ <strong>¡Correcto!</strong> ${e.exp}`;punto(tI);}
  else{inp.classList.add('err');card.classList.add('incorrecto');fb.className='feedback err';fb.innerHTML=`❌ <strong>Incorrecto.</strong> Aceptada: <strong>${e.ans[0]}</strong>. ${e.exp}`;}
}
function rTR(tI,eI){
  const inp=document.getElementById(`ti-${tI}-${eI}`);
  const btn=document.getElementById(`tb-${tI}-${eI}`);
  const card=document.getElementById(`tr-${tI}-${eI}`);
  const fb=document.getElementById(`fb-tr-${tI}-${eI}`);
  if(inp.disabled)return;
  const resp=inp.value.trim();if(!resp)return;
  inp.disabled=true;btn.disabled=true;registrar(tI);
  const e=TEMAS[tI].tr[eI];
  const clean=s=>s.toLowerCase().replace(/[?.!]/g,'').trim();
  const ok=e.ans.map(a=>clean(a)).includes(clean(resp));
  if(ok){inp.classList.add('ok');card.classList.add('correcto');fb.className='feedback ok';fb.innerHTML=`✅ <strong>¡Correcto!</strong> ${e.exp}`;punto(tI);}
  else{inp.classList.add('err');card.classList.add('incorrecto');fb.className='feedback err';fb.innerHTML=`❌ <strong>Incorrecto.</strong> Correcta: <strong>${e.ans[0]}</strong>. ${e.exp}`;}
}

// ══════════════════════════════════════════════════════
// PUNTAJE
// ══════════════════════════════════════════════════════
function punto(tI){
  puntosPorTema[tI]++;puntosTotal++;
  const el=document.getElementById('pts-tema');if(el)el.textContent=puntosPorTema[tI];
  document.getElementById('score-total').textContent=puntosTotal;
  actualizarProg(tI);
}
function registrar(tI){
  respondidoPorTema[tI]++;actualizarProg(tI);verificarFin(tI);
}
function actualizarProg(tI){
  const t=TEMAS[tI];const total=t.mc.length+t.fill.length+t.tr.length;
  const pct=Math.round((respondidoPorTema[tI]/total)*100);
  const pb=document.getElementById('pb');if(pb)pb.style.width=pct+'%';
  renderSidebar();
}
function verificarFin(tI){
  const t=TEMAS[tI];const total=t.mc.length+t.fill.length+t.tr.length;
  if(respondidoPorTema[tI]>=total){
    const pts=puntosPorTema[tI];
    const pct=Math.round((pts/total)*100);
    const em=pct>=80?'🏆':pct>=60?'👍':'📚';
    const res=document.getElementById(`res-${tI}`);
    if(res){res.className='resumen vis';res.innerHTML=`
      <div style="font-size:40px;margin-bottom:8px">${em}</div>
      <h3>¡Tema completado!</h3>
      <div class="big-score">${pts}/${total}</div>
      <p>${pct}% correcto — ${pct>=80?'¡Excelente!':pct>=60?'Buen trabajo.':'Sigue practicando.'}</p>`;}
    const bs=document.getElementById(`btn-sig-${tI}`);if(bs)bs.style.display='inline-block';
  }
}

// ══════════════════════════════════════════════════════
// SIDEBAR MÓVIL
// ══════════════════════════════════════════════════════
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function cerrarSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

renderSidebar();
</script>
